# This feedstock builds whisper.cpp with different acceleration backends
# Similar structure to llama.cpp-feedstock since both use GGML

# Build different BLAS implementations for CPU acceleration
blas_impl:
  - mkl                        # [win or (linux and x86_64)]
  - openblas                   # [linux]
  - accelerate                 # [osx]
  - cublas                     # [win or linux]

# GPU acceleration variants
gpu_variant:
  - none
  - metal                      # [osx]
  - cuda-12                    # [win or linux]
  - cuda-13                    # [win or linux]

# whisper.cpp Metal support requires MTLBuffer.gpuAddress (macOS 13.0+)
# Use SDK 14.5 like llama.cpp for all macOS builds
# This allows building with latest SDK while supporting older runtime versions via deployment target
OSX_SDK_VER:                   # [osx]
  - 14.5                       # [osx]

# CUDA compiler version — values match aggregate CBC pin (12.9 + 13.0); we
# redefine here only to add the `none` entry for the non-CUDA variant so
# zip_keys can align it with gpu_variant. `cuda_compiler: cuda-nvcc` comes
# from the aggregate CBC.
cuda_compiler_version:         # [win or linux]
  - none                       # [win or linux]
  - 12.9                       # [win or linux]
  - 13.0                       # [win or linux]

# Zip gpu_variant with cuda_compiler_version to ensure they're built together
zip_keys:                      # [win or linux]
  -                            # [win or linux]
    - gpu_variant              # [win or linux]
    - cuda_compiler_version    # [win or linux]
