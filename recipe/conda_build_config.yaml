# This feedstock builds whisper.cpp with different acceleration backends
# Similar structure to llama.cpp-feedstock since both use GGML

# Build different BLAS implementations for CPU acceleration
blas_impl:
  - mkl                        # [win or (linux and x86_64)]
  - openblas                   # [linux]
  - accelerate                 # [osx]
  - cublas                     # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

# GPU acceleration variants
gpu_variant:
  - none
  - metal                      # [osx and arm64]
  - cuda-12                    # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

# whisper.cpp v1.8.2 Metal support requires macOS 13.0+ for MTLBuffer.gpuAddress
# We require 13.0+ for all osx-arm64 builds for consistency (matching llama.cpp approach)
MACOSX_DEPLOYMENT_TARGET:      # [osx and arm64]
  - 13.0                       # [osx and arm64]

# Use SDK 13.3+ to support Metal features (gpuAddress property)
OSX_SDK_VER:                   # [osx]
  - 13.3                       # [osx]

# CUDA compiler configuration
cuda_compiler_version:         # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  - none                       # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  - 12.4                       # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

cuda_compiler:                 # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
- cuda-nvcc                    # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]

# Zip gpu_variant with cuda_compiler_version to ensure they're built together
zip_keys:                      # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
  -                            # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
    - gpu_variant              # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
    - cuda_compiler_version    # [ANACONDA_ROCKET_ENABLE_CUDA and (win or (linux and x86_64))]
